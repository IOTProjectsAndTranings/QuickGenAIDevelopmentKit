<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hackathon AI Assistant</title>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Space Grotesk', sans-serif; background: #0b0f1a; color: #e2e8f0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a2035; }
    ::-webkit-scrollbar-thumb { background: #3b82f6; border-radius: 3px; }
    .mono { font-family: 'JetBrains Mono', monospace; }
    @keyframes pulse-dot { 0%,100% { opacity:1; } 50% { opacity:0.3; } }
    .pulse { animation: pulse-dot 1.2s ease-in-out infinite; }
    @keyframes slide-in { from { opacity:0; transform: translateY(8px); } to { opacity:1; transform: translateY(0); } }
    .slide-in { animation: slide-in 0.25s ease-out; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
// ── CONFIG — change API key to match your .env ────────────────────────────
const BASE_URL   = "http://localhost:8000";
const API_KEY    = "hackathon-secret-key-123";
const APP_TITLE  = "IoT AI Assistant";   // ✏️ Change on hackathon day
// ─────────────────────────────────────────────────────────────────────────

const { useState, useEffect, useRef } = React;

const api = async (path, method = "GET", body = null) => {
  const res = await fetch(`${BASE_URL}${path}`, {
    method,
    headers: { "Content-Type": "application/json", "X-API-Key": API_KEY },
    body: body ? JSON.stringify(body) : null,
  });
  if (!res.ok) throw new Error(`API error ${res.status}`);
  return res.json();
};

// ── Status Badge ─────────────────────────────────────────────────────────────
const Badge = ({ status }) => {
  const colors = {
    online:  "bg-emerald-500/20 text-emerald-400 border border-emerald-500/30",
    offline: "bg-red-500/20 text-red-400 border border-red-500/30",
    warning: "bg-amber-500/20 text-amber-400 border border-amber-500/30",
  };
  return (
    <span className={`px-2 py-0.5 rounded text-xs mono font-semibold ${colors[status] || colors.warning}`}>
      {status}
    </span>
  );
};

// ── Device / Entity Panel ─────────────────────────────────────────────────────
const EntityPanel = () => {
  const [entities, setEntities] = useState([]);
  const [alerts,   setAlerts]   = useState([]);

  useEffect(() => {
    api("/api/data/entities").then(r => setEntities(r.data)).catch(() => {});
    api("/api/data/alerts").then(r => setAlerts(r.data)).catch(() => {});
  }, []);

  return (
    <div className="flex flex-col gap-3 h-full overflow-y-auto pr-1">
      <p className="text-xs text-slate-500 uppercase tracking-widest mono">Entities ({entities.length})</p>
      {entities.map(e => (
        <div key={e.id} className="bg-slate-800/60 border border-slate-700/50 rounded-lg p-3 slide-in">
          <div className="flex items-center justify-between mb-1">
            <span className="text-sm font-semibold text-slate-200 truncate">{e.name}</span>
            <Badge status={e.status} />
          </div>
          <div className="flex gap-3 text-xs text-slate-400 mono mt-1">
            <span>{e.id}</span>
            {e.value !== null && e.value !== undefined && (
              <span className="text-blue-400">{e.value} {e.unit}</span>
            )}
          </div>
          {e.protocol && <span className="text-xs text-slate-500">{e.protocol} · {e.location}</span>}
        </div>
      ))}

      {alerts.length > 0 && (
        <>
          <p className="text-xs text-slate-500 uppercase tracking-widest mono mt-2">Active Alerts ({alerts.length})</p>
          {alerts.map(a => (
            <div key={a.id} className="bg-red-900/20 border border-red-500/30 rounded-lg p-3 slide-in">
              <div className="flex items-center gap-2 mb-1">
                <span className="text-red-400 text-xs font-bold uppercase mono">{a.severity}</span>
                <span className="text-xs text-slate-400 mono">{a.device_id}</span>
              </div>
              <p className="text-sm text-slate-300">{a.message}</p>
            </div>
          ))}
        </>
      )}
    </div>
  );
};

// ── Chat Message ──────────────────────────────────────────────────────────────
const Message = ({ msg, onFeedback }) => {
  const isUser = msg.role === "user";
  const [rated, setRated] = useState(null);

  const handleFeedback = async (rating) => {
    setRated(rating);
    await api("/api/ai/feedback", "POST", { response_id: msg.response_id, rating });
  };

  return (
    <div className={`slide-in flex flex-col ${isUser ? "items-end" : "items-start"} gap-1`}>
      <div className={`max-w-[80%] rounded-2xl px-4 py-3 text-sm leading-relaxed
        ${isUser
          ? "bg-blue-600 text-white rounded-tr-sm"
          : "bg-slate-800 border border-slate-700/50 text-slate-200 rounded-tl-sm"}`}>
        {msg.content}
      </div>

      {!isUser && msg.response_id && (
        <div className="flex gap-2 px-1">
          <button onClick={() => handleFeedback(1)}
            className={`text-lg transition-transform hover:scale-125 ${rated === 1 ? "opacity-100" : "opacity-30 hover:opacity-70"}`}
            title="Helpful">👍</button>
          <button onClick={() => handleFeedback(-1)}
            className={`text-lg transition-transform hover:scale-125 ${rated === -1 ? "opacity-100" : "opacity-30 hover:opacity-70"}`}
            title="Not helpful">👎</button>
        </div>
      )}
    </div>
  );
};

// ── Main App ──────────────────────────────────────────────────────────────────
const App = () => {
  const [messages, setMessages] = useState([
    { role: "assistant", content: `Hello! I'm your ${APP_TITLE}. Ask me anything about your data.`, response_id: null }
  ]);
  const [input,   setInput]   = useState("");
  const [loading, setLoading] = useState(false);
  const [health,  setHealth]  = useState(null);
  const [tab,     setTab]     = useState("chat");
  const bottomRef = useRef(null);

  useEffect(() => {
    api("/health").then(setHealth).catch(() => setHealth({ status: "error", sarvam_connected: false }));
  }, []);

  useEffect(() => {
    bottomRef.current?.scrollIntoView({ behavior: "smooth" });
  }, [messages, loading]);

  const sendMessage = async () => {
    if (!input.trim() || loading) return;
    const userMsg = { role: "user", content: input };
    setMessages(prev => [...prev, userMsg]);
    setInput("");
    setLoading(true);

    try {
      const data = await api("/api/ai/chat", "POST", { prompt: input, include_context: true });
      setMessages(prev => [...prev, {
        role: "assistant",
        content: data.response,
        response_id: data.response_id
      }]);
    } catch (e) {
      setMessages(prev => [...prev, {
        role: "assistant",
        content: "⚠️ Error connecting to AI. Check server logs.",
        response_id: null
      }]);
    } finally {
      setLoading(false);
    }
  };

  const onKey = (e) => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } };

  return (
    <div className="h-screen flex flex-col">
      {/* Header */}
      <header className="bg-slate-900 border-b border-slate-700/50 px-6 py-3 flex items-center justify-between">
        <div className="flex items-center gap-3">
          <div className="w-8 h-8 bg-blue-600 rounded-lg flex items-center justify-center text-sm font-bold">AI</div>
          <div>
            <h1 className="font-bold text-slate-100 text-sm">{APP_TITLE}</h1>
            <p className="text-xs text-slate-500 mono">Powered by Sarvam AI</p>
          </div>
        </div>
        {health && (
          <div className="flex items-center gap-2">
            <span className={`w-2 h-2 rounded-full ${health.sarvam_connected ? "bg-emerald-400 pulse" : "bg-red-400"}`}/>
            <span className="text-xs text-slate-400 mono">{health.sarvam_connected ? "Sarvam Connected" : "Sarvam Offline"}</span>
          </div>
        )}
      </header>

      {/* Body */}
      <div className="flex-1 flex overflow-hidden">
        {/* Sidebar */}
        <aside className="w-80 bg-slate-900/50 border-r border-slate-700/40 p-4 hidden md:flex flex-col">
          <div className="flex gap-2 mb-4">
            {["chat", "data"].map(t => (
              <button key={t} onClick={() => setTab(t)}
                className={`flex-1 py-1.5 rounded-lg text-xs font-semibold capitalize transition
                  ${tab === t ? "bg-blue-600 text-white" : "bg-slate-800 text-slate-400 hover:text-slate-200"}`}>
                {t === "chat" ? "💬 Chat" : "📊 Data"}
              </button>
            ))}
          </div>
          {tab === "data" ? <EntityPanel /> : (
            <div className="text-xs text-slate-500 space-y-2 mono">
              <p className="text-slate-400 font-semibold">Quick prompts:</p>
              {[
                "Show all offline devices",
                "What alerts are active?",
                "Which sensors are in Zone A?",
                "Summarize current system status",
              ].map(q => (
                <button key={q} onClick={() => setInput(q)}
                  className="w-full text-left px-3 py-2 bg-slate-800/60 hover:bg-slate-700/60
                    border border-slate-700/40 rounded-lg text-slate-300 hover:text-white transition">
                  {q}
                </button>
              ))}
            </div>
          )}
        </aside>

        {/* Chat area */}
        <main className="flex-1 flex flex-col bg-slate-900/30">
          <div className="flex-1 overflow-y-auto p-6 space-y-4">
            {messages.map((msg, i) => <Message key={i} msg={msg} />)}
            {loading && (
              <div className="flex items-start gap-2 slide-in">
                <div className="bg-slate-800 border border-slate-700/50 rounded-2xl rounded-tl-sm px-4 py-3">
                  <div className="flex gap-1">
                    {[0,1,2].map(i => (
                      <span key={i} className="w-2 h-2 bg-blue-400 rounded-full pulse"
                        style={{ animationDelay: `${i * 0.2}s` }} />
                    ))}
                  </div>
                </div>
              </div>
            )}
            <div ref={bottomRef} />
          </div>

          {/* Input */}
          <div className="p-4 border-t border-slate-700/40 bg-slate-900/60">
            <div className="flex gap-3 items-end">
              <textarea
                rows={2}
                className="flex-1 bg-slate-800 border border-slate-700/50 rounded-xl px-4 py-3
                  text-sm text-slate-200 placeholder-slate-500 resize-none focus:outline-none
                  focus:border-blue-500/70 transition"
                placeholder="Ask anything... (Enter to send)"
                value={input}
                onChange={e => setInput(e.target.value)}
                onKeyDown={onKey}
              />
              <button onClick={sendMessage} disabled={loading || !input.trim()}
                className="bg-blue-600 hover:bg-blue-500 disabled:bg-slate-700 disabled:cursor-not-allowed
                  text-white rounded-xl px-5 py-3 text-sm font-semibold transition whitespace-nowrap">
                {loading ? "..." : "Send →"}
              </button>
            </div>
            <p className="text-xs text-slate-600 mt-2 mono text-center">
              Rate AI responses with 👍 👎 to improve accuracy
            </p>
          </div>
        </main>
      </div>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
